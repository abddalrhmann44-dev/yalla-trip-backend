name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "yalla_trip_backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "yalla_trip_backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: yalla_trip_backend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: yalla
          POSTGRES_PASSWORD: yalla_secret
          POSTGRES_DB: yalla_trip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yalla"
          --health-interval 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "true"
      SECRET_KEY: test-secret-key-do-not-use-in-prod
      DATABASE_URL: postgresql+asyncpg://yalla:yalla_secret@localhost:5432/yalla_trip
      DATABASE_URL_SYNC: postgresql://yalla:yalla_secret@localhost:5432/yalla_trip
      TEST_DATABASE_URL: postgresql+asyncpg://yalla:yalla_secret@localhost:5432/yalla_trip_test
      REDIS_URL: redis://localhost:6379/0
      FIREBASE_CREDENTIALS_JSON: "{}"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: yalla_trip_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: yalla_secret
        run: |
          psql -h localhost -U yalla -d postgres -c "CREATE DATABASE yalla_trip_test OWNER yalla;" || true

      - name: Ruff lint
        run: ruff check

      - name: Pytest
        run: pytest -q --maxfail=5

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: yalla_trip_backend
          push: false
          tags: yalla-trip-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
