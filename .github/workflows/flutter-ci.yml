name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/flutter-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "lib/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/flutter-ci.yml"

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib

      - name: Test
        # Some projects have no tests yet — skip gracefully.
        run: |
          if [ -d test ]; then
            flutter test --no-pub || exit 1
          else
            echo "No test directory; skipping."
          fi

  android-build:
    name: Android build (debug)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug --no-tree-shake-icons
