# ═══════════════════════════════════════════════════════════
#  Talaa API — production compose file
#
#  Differences from docker-compose.yml (dev):
#    • Uses Dockerfile.prod (gunicorn, non-root user, multi-stage).
#    • No volume mount / no --reload — image contents are frozen.
#    • Resource limits, restart policies, logging rotation.
#    • Nginx reverse-proxy with SSL termination on :80 / :443.
#    • Postgres + Redis bind only to the internal network.
#
#  Deploy:
#    docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ═══════════════════════════════════════════════════════════

services:
  # ── API Server ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: talaa-api:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      # Override APP_ENV / DEBUG in case .env.prod forgot to.
      APP_ENV: production
      DEBUG: "false"
      WORKERS: "${API_WORKERS:-4}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-2.0}"
          memory: "${API_MEM_LIMIT:-1g}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # No ports exposed to host — Nginx proxies on the internal network.
    expose:
      - "8000"
    networks:
      - internal

  # ── Nginx reverse proxy + TLS ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  # ── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-talaa}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Daily backup dump target – mount a host path here if desired.
      - ./deploy/pg_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-talaa} -d ${POSTGRES_DB:-talaa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${DB_CPU_LIMIT:-2.0}"
          memory: "${DB_MEM_LIMIT:-1g}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # --maxmemory caps memory usage; allkeys-lru evicts least-recently-used
    # keys under pressure so the cache can never take down the host.
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - internal

volumes:
  pg_data:
  redis_data:
  nginx_logs:

networks:
  internal:
    driver: bridge
