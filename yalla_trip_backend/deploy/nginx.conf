# ═══════════════════════════════════════════════════════════
#  Talaa API — Nginx reverse-proxy config
#
#  Responsibilities:
#    • Terminates TLS on :443, redirects plain HTTP → HTTPS.
#    • Proxies /api/* and all other paths to the FastAPI upstream.
#    • Sets X-Forwarded-For so the backend sees the real client IP
#      (used by the refresh-token session tracker).
#    • Applies sensible request size + timeout caps.
# ═══════════════════════════════════════════════════════════

upstream talaa_api {
    server api:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let certbot's webroot challenge still work while redirecting.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS reverse proxy ────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # Swap these for real certs from certbot / your provider.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;          # property image uploads
    proxy_read_timeout   60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout   60s;

    location / {
        proxy_pass http://talaa_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Required for the chat WebSocket endpoint.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Let K8s / external monitors hit /health without the normal
    # rate-limit we might apply elsewhere.
    location = /health {
        access_log off;
        proxy_pass http://talaa_api/health;
    }

    location = /health/live {
        access_log off;
        proxy_pass http://talaa_api/health/live;
    }
}
